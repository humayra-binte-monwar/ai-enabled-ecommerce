services:
  - type: web
    name: ai-grocery-commerce-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: AI_PROVIDER
        value: groq
      - key: AI_AGENT_ENABLED
        value: true
      - key: AI_HEALTH_DISCLAIMER_ENABLED
        value: true
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_CHAT_MODEL
        value: llama-3.1-8b-instant
      - key: SSLCOMMERZ_SANDBOX
        value: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SSLCOMMERZ_STORE_ID
        sync: false
      - key: SSLCOMMERZ_STORE_PASSWORD
        sync: false
